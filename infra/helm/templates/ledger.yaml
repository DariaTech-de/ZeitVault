apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeitvault.fullname" . }}-ledger
  labels:
    {{- include "zeitvault.labels" . | nindent 4 }}
    app.kubernetes.io/component: ledger
spec:
  replicas: {{ .Values.ledger.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ledger
  template:
    metadata:
      labels:
        {{- include "zeitvault.labels" . | nindent 8 }}
        app.kubernetes.io/component: ledger
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ledger
          image: {{ include "zeitvault.image" (merge (dict "component" "ledger") .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.ledger.port }}
          env:
            - name: PORT
              value: {{ .Values.ledger.port | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: zeitvault-ledger
            # Getrennte Ledger-Datenbank (ADR-0006) aus extern verwaltetem Secret.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: LEDGER_DATABASE_URL
          readinessProbe:
            httpGet:
              path: {{ .Values.ledger.probes.path }}
              port: {{ .Values.ledger.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.ledger.probes.path }}
              port: {{ .Values.ledger.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ledger.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zeitvault.fullname" . }}-ledger
  labels:
    {{- include "zeitvault.labels" . | nindent 4 }}
    app.kubernetes.io/component: ledger
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ledger
  ports:
    - port: {{ .Values.ledger.port }}
      targetPort: {{ .Values.ledger.port }}
      protocol: TCP
