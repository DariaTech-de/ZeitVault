# Prometheus-Konfiguration (Beispiel). Scrapt die vom OpenTelemetry-Collector
# exponierten Metriken. Produktion: Scrape-Intervalle und Retention je Betrieb.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
