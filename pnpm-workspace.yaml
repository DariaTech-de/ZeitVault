packages:
  - "apps/*"
  # Mobile (Expo) ist aktuell ein Geruest und vom Workspace-Install ausgenommen,
  # damit der verifizierte Build/CI nicht von der (hier nicht lauffaehigen)
  # Expo-Toolchain abhaengt. Zum Aktivieren diese Zeile entfernen und
  # `pnpm install` ausfuehren (siehe apps/mobile/README.md).
  - "!apps/mobile"
  - "packages/*"
