name: Release

# CD-Pipeline (ARCHITEKTUR.md Paragraf 16): Build -> Scan -> SBOM -> Cosign-
# Signatur -> Release. Ausgeloest durch ein Versions-Tag. Lint/Test/Build laufen
# im CI-Workflow als Gate vor dem Merge auf main; dieser Workflow veroeffentlicht
# signierte, gescannte Images mit SBOM.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  images:
    name: Build, scan, SBOM, sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Cosign keyless (OIDC)
    strategy:
      matrix:
        component: [api, ledger]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.component }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:${{ github.ref_name }}

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:${{ github.ref_name }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom-${{ matrix.component }}.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image and attach SBOM (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component }}@${DIGEST}"
          cosign sign --yes "$REF"
          cosign attest --yes --predicate sbom-${{ matrix.component }}.spdx.json --type spdxjson "$REF"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component }}
          path: sbom-${{ matrix.component }}.spdx.json

  release:
    name: Publish release
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
